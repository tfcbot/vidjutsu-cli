name: Sync OpenAPI Spec

on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch latest spec
        run: |
          mkdir -p spec
          curl -sL https://raw.githubusercontent.com/tfcbot/vidjutsu-openapi/main/openapi/spec.json -o spec/openapi.json

      - name: Check for changes
        id: diff
        run: |
          git add spec/openapi.json
          if git diff --staged --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Create PR
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          BRANCH="sync-spec-$(date +%Y%m%d%H%M%S)"
          git checkout -b "$BRANCH"
          git commit -m "chore: sync OpenAPI spec from vidjutsu-openapi"
          git push origin "$BRANCH"
          gh pr create --title "chore: sync OpenAPI spec" --body "Auto-synced from [tfcbot/vidjutsu-openapi](https://github.com/tfcbot/vidjutsu-openapi)." --base main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
